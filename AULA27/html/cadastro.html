<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/form.css">
    <title>Tela de Cadastro</title>
</head>

<body>
    <main class="principal">
        <form id="form-cadastro" class="formulario">
            <h1>Cadastre-se</h1>

            <label for="email">Nome</label>
            <input type="text" nome="nome" id="nome" required>

            <label for="email">E-mail</label>
            <input type="email" nome="email" id="email" required>

            <!--<p id="aviso2"></p>-->
            <p class="msg" id="aviso"></p>
            
            <label for="senha">Senha</label>
            <input type="password" nome="senha" id="senha" required>

            <button type="submit" class="btn">Cadastrar</button>

            <p class="rodape-form">Já possui conta? <a href="./login.html">Faça login</a></p>


        </form>
    </main>
    <script type="module" src="../js/cadastro.js"></script>
</body>

</html>

<!DOCTYPE html> <!--Informa ao navegador que esse documento usa HTML5--> 
<html lang="pt-BR"> <!--Marca o icicio da pagina HTML. O atributo lang = pt-BR indica que o idioma principal é o portugues-->
<head> <!--Cabeçalho da pagina. Aqui fica configurações e informações que nao aparecem no corpo da pagina-->
    <meta charset="UTF-8"> <!--Define o padrao de caracteres. Permite acento, ç, emojis e caracteres especiais-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--faz a pagina adaptar a celulares e computadores--> 
    <title>Meu primeiro site</title>
</head> <!--Fecha a tag HEAD-->
<body> <!--Corpo da pagina. Tudo o que aparece pro usuario fica aqui!-->
    <h1>Bem-vindo ao meu site!</h1>
    <h2>Site para estudo do meu curso de full stack</h2>  
    <p>Esta é uma estrutura HTML básica</p>  
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</body>
</html>
